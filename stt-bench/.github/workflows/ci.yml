name: tldh-bench - Build, Test and Auto Release

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

env:
  VERSION_NAME: 0.1.0
  VERSION_CODE: 100

jobs:
  verify_android:
    name: Verify Android benchmark build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - name: Build debug APK and run tests
        run: bash scripts/gradle.sh lintDebug testDebugUnitTest assembleDebug
      - name: Collect debug APK
        if: success()
        run: |
          set -euo pipefail
          mkdir -p dist/debug
          cp app/build/outputs/apk/debug/app-debug.apk dist/debug/tldh-bench-debug.apk
          (cd dist/debug && sha256sum *.apk > SHA256SUMS.txt)
      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: tldh-bench-debug-apk-${{ github.sha }}
          path: dist/debug/*

  publish_stable_release:
    name: Publish benchmark APK release
    needs: verify_android
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - name: Check if release exists
        id: release_check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="v${VERSION_NAME}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release $TAG already exists. Skipping publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Prepare signing key when available
        if: steps.release_check.outputs.exists == 'false'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          if [ -n "${ANDROID_KEYSTORE_BASE64:-}" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/bench-release.jks"
            echo "ANDROID_KEYSTORE_FILE=$RUNNER_TEMP/bench-release.jks" >> "$GITHUB_ENV"
          else
            echo "No signing secret set. Release will use debug signing for benchmark-only installability."
          fi
      - name: Build release APK
        if: steps.release_check.outputs.exists == 'false'
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: bash scripts/gradle.sh assembleRelease
      - name: Package release assets
        if: steps.release_check.outputs.exists == 'false'
        run: |
          set -euo pipefail
          mkdir -p dist/release
          cp app/build/outputs/apk/release/app-release.apk "dist/release/tldh-bench-${VERSION_NAME}.apk"
          (cd dist/release && sha256sum *.apk > SHA256SUMS.txt)
          python - <<'PY'
          import json, os, pathlib
          v=os.environ['VERSION_NAME']
          out=pathlib.Path('dist/release/release-manifest.json')
          out.write_text(json.dumps({
            'app':'tldh-stt-bench',
            'version':v,
            'versionCode':int(os.environ['VERSION_CODE']),
            'channel':'benchmark',
            'asset':f'tldh-bench-{v}.apk'
          }, indent=2), encoding='utf-8')
          PY
      - name: Publish GitHub release
        if: steps.release_check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "v${VERSION_NAME}" dist/release/* \
            --title "tl;dh STT Bench v${VERSION_NAME}" \
            --notes "Separate German STT benchmark app. Does not modify the main tl;dh app."

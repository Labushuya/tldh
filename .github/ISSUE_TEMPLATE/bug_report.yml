name: Bug report
description: Report a reproducible tl;dh issue
title: "[Bug]: "
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device / Android version
      placeholder: HONOR Magic V2, Android ...
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots

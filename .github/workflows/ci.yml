name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  android:
    name: Android CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Lint and unit tests
        run: |
          bash scripts/gradle.sh lintOfflineDebug testOfflineDebugUnitTest

      - name: Assemble debug APKs
        run: |
          bash scripts/gradle.sh assembleOfflineDebug assembleUpdaterDebug

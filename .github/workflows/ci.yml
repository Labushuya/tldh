name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  android:
    name: Android CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Lint, unit tests, and debug APKs
        run: |
          bash scripts/gradle.sh lintOfflineDebug testOfflineDebugUnitTest assembleOfflineDebug assembleUpdaterDebug

      - name: Collect debug APK artifacts
        run: |
          set -euo pipefail
          mkdir -p dist/ci
          cp app/build/outputs/apk/offline/debug/*.apk dist/ci/tldh-offline-debug.apk
          cp app/build/outputs/apk/updater/debug/*.apk dist/ci/tldh-updater-debug.apk
          (cd dist/ci && sha256sum *.apk > SHA256SUMS.txt)

      - name: Upload debug APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tldh-debug-apks-${{ github.sha }}
          path: |
            dist/ci/*.apk
            dist/ci/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 14

  auto_release:
    name: Auto publish stable release
    needs: android
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve app version
        id: version
        run: |
          set -euo pipefail
          VERSION="$(python3 - <<'PY'
from pathlib import Path
import re
text = Path('app/build.gradle.kts').read_text(encoding='utf-8')
match = re.search(r'\?:\s*"([0-9]+\.[0-9]+\.[0-9]+)"', text)
if not match:
    raise SystemExit('Unable to resolve fallback SemVer version from app/build.gradle.kts')
print(match.group(1))
PY
)"
          IFS=. read -r major minor patch <<< "$VERSION"
          VERSION_CODE=$((major * 10000 + minor * 100 + patch))
          if [[ "$VERSION_CODE" -lt 1 ]]; then
            VERSION_CODE=1
          fi
          TAG_NAME="v$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "Resolved $TAG_NAME / versionCode $VERSION_CODE"

      - name: Skip if release already exists
        id: existing
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.version.outputs.tag_name }}
        run: |
          set -euo pipefail
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release $TAG_NAME already exists. Skipping automatic publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify signing secrets
        if: steps.existing.outputs.exists != 'true'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          missing=0
          for name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::Missing GitHub Actions secret: $name"
              missing=1
            fi
          done
          exit "$missing"

      - name: Set up JDK 17
        if: steps.existing.outputs.exists != 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Android SDK
        if: steps.existing.outputs.exists != 'true'
        uses: android-actions/setup-android@v3

      - name: Decode release keystore
        if: steps.existing.outputs.exists != 'true'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/keystore"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/keystore/tldh-release.jks"

      - name: Build signed release APKs
        if: steps.existing.outputs.exists != 'true'
        env:
          ANDROID_KEYSTORE_FILE: ${{ runner.temp }}/keystore/tldh-release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          bash scripts/gradle.sh \
            -PVERSION_NAME="${{ steps.version.outputs.version }}" \
            -PVERSION_CODE="${{ steps.version.outputs.version_code }}" \
            assembleOfflineRelease assembleUpdaterRelease

      - name: Collect SemVer APKs and checksums
        if: steps.existing.outputs.exists != 'true'
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          VERSION_CODE="${{ steps.version.outputs.version_code }}"
          mkdir -p dist
          cp app/build/outputs/apk/offline/release/*.apk "dist/tldh-offline-$VERSION.apk"
          cp app/build/outputs/apk/updater/release/*.apk "dist/tldh-updater-$VERSION.apk"
          (cd dist && sha256sum *.apk > SHA256SUMS.txt)
          bash scripts/create-release-manifest.sh "$VERSION" "$VERSION_CODE" "dist/tldh-updater-$VERSION.apk" stable
          mv release-manifest.json dist/release-manifest.json
          python scripts/verify-stable-release.py dist/release-manifest.json

      - name: Create GitHub Release
        if: steps.existing.outputs.exists != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          target_commitish: ${{ github.sha }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/*.apk
            dist/SHA256SUMS.txt
            dist/release-manifest.json

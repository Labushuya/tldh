name: "tldh - Build, Test and Auto Release"
run-name: "Build, Test and Auto Release - ${{ github.ref_name }} - ${{ github.sha }}"

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tldh-ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify_android:
    name: "Verify Android build"
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_code: ${{ steps.version.outputs.version_code }}
      tag_name: ${{ steps.version.outputs.tag_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve app SemVer from Gradle defaults
        id: version
        run: |
          set -euo pipefail
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import pathlib
          import re
          import sys
          text = pathlib.Path('app/build.gradle.kts').read_text(encoding='utf-8')
          version_match = re.search(r'versionName\s*=\s*\([^\n]+?\?:\s*"([0-9]+\.[0-9]+\.[0-9]+)"', text, re.DOTALL)
          if not version_match:
              version_match = re.search(r'\?:\s*"([0-9]+\.[0-9]+\.[0-9]+)"', text)
          code_match = re.search(r'versionCode\s*=\s*\([^\n]+?\?:\s*"?([0-9]+)"?\)?\.toInt\(\)', text, re.DOTALL)
          if not code_match:
              code_match = re.search(r'\?:\s*"([0-9]+)"\)\.toInt\(\)', text)
          if not version_match:
              raise SystemExit('Could not resolve default SemVer from app/build.gradle.kts. Expected fallback like ?: "0.2.1".')
          if not code_match:
              raise SystemExit('Could not resolve default versionCode from app/build.gradle.kts. Expected fallback like ?: "201").toInt().')
          version = version_match.group(1)
          version_code = code_match.group(1)
          print(f'version={version}')
          print(f'version_code={version_code}')
          print(f'tag_name=v{version}')
          print(f'Resolved tl;dh version {version} ({version_code})', file=sys.stderr)
          PY

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Run lint, unit tests, and debug APK builds
        run: |
          bash scripts/gradle.sh lintOfflineDebug testOfflineDebugUnitTest assembleOfflineDebug assembleUpdaterDebug

      - name: Collect debug APKs and checksums
        run: |
          set -euo pipefail
          mkdir -p dist/debug
          find app/build/outputs/apk -type f -name "*.apk" -print
          cp app/build/outputs/apk/offline/debug/*.apk dist/debug/tldh-offline-debug.apk
          cp app/build/outputs/apk/updater/debug/*.apk dist/debug/tldh-updater-debug.apk
          cd dist/debug
          sha256sum *.apk > SHA256SUMS.txt

      - name: Upload debug APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tldh-debug-apks-${{ github.sha }}
          path: dist/debug/*
          if-no-files-found: error
          retention-days: 14

  publish_stable_release:
    name: "Publish stable GitHub release"
    needs: verify_android
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Skip publish if stable release already exists
        id: existing
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.verify_android.outputs.tag_name }}
        run: |
          set -euo pipefail
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release $TAG_NAME already exists. Nothing to publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Release $TAG_NAME does not exist yet. Publishing after successful verification."
          fi

      - name: Ensure signing secrets are present
        if: steps.existing.outputs.exists != 'true'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          test -n "$ANDROID_KEYSTORE_BASE64"
          test -n "$ANDROID_KEYSTORE_PASSWORD"
          test -n "$ANDROID_KEY_ALIAS"
          test -n "$ANDROID_KEY_PASSWORD"

      - name: Set up JDK 17
        if: steps.existing.outputs.exists != 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Android SDK
        if: steps.existing.outputs.exists != 'true'
        uses: android-actions/setup-android@v3

      - name: Decode release keystore
        if: steps.existing.outputs.exists != 'true'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > tldh-release.jks

      - name: Build signed release APKs
        if: steps.existing.outputs.exists != 'true'
        env:
          ANDROID_KEYSTORE_FILE: ${{ github.workspace }}/tldh-release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          bash scripts/gradle.sh \
            -PVERSION_NAME="${{ needs.verify_android.outputs.version }}" \
            -PVERSION_CODE="${{ needs.verify_android.outputs.version_code }}" \
            assembleOfflineRelease assembleUpdaterRelease

      - name: Collect release APKs, checksums, and manifest
        if: steps.existing.outputs.exists != 'true'
        run: |
          set -euo pipefail
          VERSION="${{ needs.verify_android.outputs.version }}"
          VERSION_CODE="${{ needs.verify_android.outputs.version_code }}"
          mkdir -p dist/release
          cp app/build/outputs/apk/offline/release/*.apk "dist/release/tldh-offline-$VERSION.apk"
          cp app/build/outputs/apk/updater/release/*.apk "dist/release/tldh-updater-$VERSION.apk"
          cd dist/release
          sha256sum *.apk > SHA256SUMS.txt
          cd ../..
          bash scripts/create-release-manifest.sh "$VERSION" "$VERSION_CODE" "dist/release/tldh-offline-$VERSION.apk" "dist/release/tldh-updater-$VERSION.apk" > dist/release/release-manifest.json
          test -s dist/release/release-manifest.json
          python -m json.tool dist/release/release-manifest.json >/dev/null
          python scripts/verify-stable-release.py dist/release/release-manifest.json

      - name: Create GitHub latest release
        if: steps.existing.outputs.exists != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.verify_android.outputs.tag_name }}
          name: "tl;dh ${{ needs.verify_android.outputs.version }}"
          make_latest: true
          generate_release_notes: true
          files: |
            dist/release/tldh-offline-${{ needs.verify_android.outputs.version }}.apk
            dist/release/tldh-updater-${{ needs.verify_android.outputs.version }}.apk
            dist/release/SHA256SUMS.txt
            dist/release/release-manifest.json

name: tldh - Build, Test and Auto Release

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'stt-bench/**'
      - '.github/workflows/stt-bench.yml'
  pull_request:
    paths-ignore:
      - 'stt-bench/**'
      - '.github/workflows/stt-bench.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify_android:
    name: Verify Android build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Run lint, unit tests and debug build
        run: bash scripts/gradle.sh lintDebug testDebugUnitTest assembleDebug

      - name: Collect debug APK
        if: success()
        run: |
          set -euo pipefail
          mkdir -p dist/debug
          cp app/build/outputs/apk/debug/*.apk dist/debug/tldh-debug.apk
          (cd dist/debug && sha256sum *.apk > SHA256SUMS.txt)

      - name: Upload debug APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: tldh-debug-apk-${{ github.sha }}
          path: |
            dist/debug/tldh-debug.apk
            dist/debug/SHA256SUMS.txt
          if-no-files-found: error

  publish_stable_release:
    name: Publish stable GitHub release
    runs-on: ubuntu-latest
    needs: verify_android
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve app SemVer from Gradle
        id: version
        run: |
          set -euo pipefail
          python - <<'PY' >> "$GITHUB_OUTPUT"
          from pathlib import Path
          import re
          text = Path('app/build.gradle.kts').read_text(encoding='utf-8')
          version = re.search(r'\?:\s*"(\d+\.\d+\.\d+)"', text)
          code = re.search(r'\?:\s*"(\d+)"\)\.toInt\(\)', text)
          if not version or not code:
              raise SystemExit('Could not resolve default versionName/versionCode from app/build.gradle.kts')
          print(f'version={version.group(1)}')
          print(f'tag_name=v{version.group(1)}')
          print(f'version_code={code.group(1)}')
          PY

      - name: Skip if release already exists
        id: existing
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.version.outputs.tag_name }}
        run: |
          set -euo pipefail
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release $TAG_NAME already exists. Skipping automatic publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify signing secrets
        if: steps.existing.outputs.exists != 'true'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          missing=0
          for name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::Missing GitHub Actions secret: $name"
              missing=1
            fi
          done
          exit "$missing"

      - name: Set up JDK 17
        if: steps.existing.outputs.exists != 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Android SDK
        if: steps.existing.outputs.exists != 'true'
        uses: android-actions/setup-android@v3

      - name: Decode release keystore
        if: steps.existing.outputs.exists != 'true'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/keystore"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/keystore/tldh-release.jks"

      - name: Build signed release APK
        if: steps.existing.outputs.exists != 'true'
        env:
          ANDROID_KEYSTORE_FILE: ${{ runner.temp }}/keystore/tldh-release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          bash scripts/gradle.sh \
            -PVERSION_NAME="${{ steps.version.outputs.version }}" \
            -PVERSION_CODE="${{ steps.version.outputs.version_code }}" \
            assembleRelease

      - name: Collect SemVer APK and checksums
        if: steps.existing.outputs.exists != 'true'
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          VERSION_CODE="${{ steps.version.outputs.version_code }}"
          mkdir -p dist
          cp app/build/outputs/apk/release/*.apk "dist/tldh-$VERSION.apk"
          (cd dist && sha256sum *.apk > SHA256SUMS.txt)
          bash scripts/create-release-manifest.sh "$VERSION" "$VERSION_CODE" "dist/tldh-$VERSION.apk" stable
          mv release-manifest.json dist/release-manifest.json
          test -s dist/release-manifest.json
          python scripts/verify-stable-release.py dist/release-manifest.json

      - name: Create GitHub Release
        if: steps.existing.outputs.exists != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          target_commitish: ${{ github.sha }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/tldh-${{ steps.version.outputs.version }}.apk
            dist/SHA256SUMS.txt
            dist/release-manifest.json

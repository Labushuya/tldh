name: Release APK

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Build signed release APKs
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          mkdir -p $RUNNER_TEMP/keystore
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > $RUNNER_TEMP/keystore/tldh-release.jks

      - name: Build release APKs
        env:
          ANDROID_KEYSTORE_FILE: ${{ runner.temp }}/keystore/tldh-release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          bash scripts/gradle.sh assembleOfflineRelease assembleUpdaterRelease

      - name: Collect artifacts and checksums
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/offline/release/*.apk dist/tldh-offline-${GITHUB_REF_NAME#v}.apk
          cp app/build/outputs/apk/updater/release/*.apk dist/tldh-updater-${GITHUB_REF_NAME#v}.apk
          (cd dist && sha256sum *.apk > SHA256SUMS.txt)
          bash scripts/create-release-manifest.sh "${GITHUB_REF_NAME#v}" "100" "dist/tldh-updater-${GITHUB_REF_NAME#v}.apk" stable
          mv release-manifest.json dist/release-manifest.json
          python scripts/verify-stable-release.py dist/release-manifest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/*.apk
            dist/SHA256SUMS.txt
            dist/release-manifest.json

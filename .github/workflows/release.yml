name: "tldh - Release by Version or Tag"
run-name: "Release - ${{ inputs.version || github.ref_name }}"

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'SemVer version to publish, for example 0.2.1'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: "Build and publish signed SemVer APKs"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve requested SemVer release
        id: version
        env:
          VERSION_INPUT: ${{ inputs.version || '' }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [ -n "$VERSION_INPUT" ]; then
            VERSION="$VERSION_INPUT"
          else
            VERSION="${REF_NAME#v}"
          fi
          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Invalid SemVer: $VERSION" >&2
            exit 1
          fi
          IFS='.' read -r MAJOR MINOR PATCH <<EOF_VERSION
          $VERSION
          EOF_VERSION
          VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))
          if [ "$VERSION_CODE" -eq 0 ]; then
            VERSION_CODE=1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "tag_name=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Stop if release already exists
        id: existing
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.version.outputs.tag_name }}
        run: |
          set -euo pipefail
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "Release $TAG_NAME already exists. No duplicate release will be created."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure signing secrets are present
        if: steps.existing.outputs.exists != 'true'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          test -n "$ANDROID_KEYSTORE_BASE64"
          test -n "$ANDROID_KEYSTORE_PASSWORD"
          test -n "$ANDROID_KEY_ALIAS"
          test -n "$ANDROID_KEY_PASSWORD"

      - name: Set up JDK 17
        if: steps.existing.outputs.exists != 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Android SDK
        if: steps.existing.outputs.exists != 'true'
        uses: android-actions/setup-android@v3

      - name: Decode release keystore
        if: steps.existing.outputs.exists != 'true'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > tldh-release.jks

      - name: Build signed release APKs
        if: steps.existing.outputs.exists != 'true'
        env:
          ANDROID_KEYSTORE_FILE: ${{ github.workspace }}/tldh-release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          bash scripts/gradle.sh \
            -PVERSION_NAME="${{ steps.version.outputs.version }}" \
            -PVERSION_CODE="${{ steps.version.outputs.version_code }}" \
            assembleOfflineRelease assembleUpdaterRelease

      - name: Collect release APKs, checksums, and manifest
        if: steps.existing.outputs.exists != 'true'
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          VERSION_CODE="${{ steps.version.outputs.version_code }}"
          mkdir -p dist/release
          cp app/build/outputs/apk/offline/release/*.apk "dist/release/tldh-offline-$VERSION.apk"
          cp app/build/outputs/apk/updater/release/*.apk "dist/release/tldh-updater-$VERSION.apk"
          cd dist/release
          sha256sum *.apk > SHA256SUMS.txt
          cd ../..
          bash scripts/create-release-manifest.sh "$VERSION" "$VERSION_CODE" "dist/release/tldh-offline-$VERSION.apk" "dist/release/tldh-updater-$VERSION.apk" > dist/release/release-manifest.json
          test -s dist/release/release-manifest.json
          python -m json.tool dist/release/release-manifest.json >/dev/null
          python scripts/verify-stable-release.py dist/release/release-manifest.json

      - name: Create GitHub latest release
        if: steps.existing.outputs.exists != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          name: "tl;dh ${{ steps.version.outputs.version }}"
          make_latest: true
          generate_release_notes: true
          files: |
            dist/release/tldh-offline-${{ steps.version.outputs.version }}.apk
            dist/release/tldh-updater-${{ steps.version.outputs.version }}.apk
            dist/release/SHA256SUMS.txt
            dist/release/release-manifest.json

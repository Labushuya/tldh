name: Release APK

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'SemVer version to release, for example 0.1.0'
        required: true
        type: string

jobs:
  release:
    name: Build signed SemVer release APKs
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release version
        id: version
        env:
          VERSION_INPUT: ${{ inputs.version || '' }}
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG_NAME="${GITHUB_REF_NAME}"
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${VERSION_INPUT}"
            TAG_NAME="v${VERSION}"
          fi

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release version must be SemVer without prefix, for example 0.1.0"
            exit 1
          fi

          IFS=. read -r major minor patch <<< "$VERSION"
          VERSION_CODE=$((major * 10000 + minor * 100 + patch))
          if [[ "$VERSION_CODE" -lt 1 ]]; then
            VERSION_CODE=1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "Resolved $TAG_NAME / versionCode $VERSION_CODE"

      - name: Verify signing secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          missing=0
          for name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::Missing GitHub Actions secret: $name"
              missing=1
            fi
          done
          exit "$missing"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/keystore"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/keystore/tldh-release.jks"

      - name: Build signed release APKs
        env:
          ANDROID_KEYSTORE_FILE: ${{ runner.temp }}/keystore/tldh-release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          bash scripts/gradle.sh \
            -PVERSION_NAME="${{ steps.version.outputs.version }}" \
            -PVERSION_CODE="${{ steps.version.outputs.version_code }}" \
            assembleOfflineRelease assembleUpdaterRelease

      - name: Collect SemVer APKs and checksums
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          VERSION_CODE="${{ steps.version.outputs.version_code }}"
          mkdir -p dist
          cp app/build/outputs/apk/offline/release/*.apk "dist/tldh-offline-$VERSION.apk"
          cp app/build/outputs/apk/updater/release/*.apk "dist/tldh-updater-$VERSION.apk"
          (cd dist && sha256sum *.apk > SHA256SUMS.txt)
          bash scripts/create-release-manifest.sh "$VERSION" "$VERSION_CODE" "dist/tldh-updater-$VERSION.apk" stable
          mv release-manifest.json dist/release-manifest.json
          python scripts/verify-stable-release.py dist/release-manifest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          target_commitish: ${{ github.sha }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/*.apk
            dist/SHA256SUMS.txt
            dist/release-manifest.json

name: tl;dh — Stable Manifest Verify
run-name: "Stable Manifest Verify • ${{ github.ref_name }}"

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'release-manifest.json'
      - 'scripts/verify-stable-release.py'

jobs:
  verify_manifest:
    name: Verify stable release manifest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Verify manifest if present
        run: |
          if [ -f release-manifest.json ]; then
            python scripts/verify-stable-release.py release-manifest.json
          else
            echo "No release-manifest.json in repo root; release workflow generates it."
          fi

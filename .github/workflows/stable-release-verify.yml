name: "tldh - Verify Stable Manifest"
run-name: "Verify Stable Manifest - ${{ github.ref_name }}"

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'scripts/verify-stable-release.py'
      - 'scripts/create-release-manifest.sh'
      - '.github/workflows/stable-release-verify.yml'

permissions:
  contents: read

jobs:
  verify_manifest_tools:
    name: "Verify stable manifest tooling"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify manifest tooling syntax
        run: |
          bash -n scripts/create-release-manifest.sh
          python -m py_compile scripts/verify-stable-release.py

name: tldh - Verify Stable Manifest

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'release-manifest.example.json'
      - 'scripts/verify-stable-release.py'

jobs:
  verify_manifest:
    name: Verify stable release manifest schema
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify example manifest
        run: python scripts/verify-stable-release.py release-manifest.example.json

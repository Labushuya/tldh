name: tldh STT Bench - Build, Test and Release

on:
  push:
    branches: [ main ]
    paths:
      - 'stt-bench/**'
      - '.github/workflows/stt-bench.yml'
  pull_request:
    paths:
      - 'stt-bench/**'
      - '.github/workflows/stt-bench.yml'
  workflow_dispatch:

permissions:
  contents: write

env:
  VERSION_NAME: 0.2.1
  VERSION_CODE: 201
  RELEASE_TAG: stt-bench-v0.2.1

jobs:
  verify_benchmark_app:
    name: Verify benchmark Android app
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: stt-bench
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Build debug benchmark APK and run tests
        run: bash scripts/gradle.sh lintDebug testDebugUnitTest assembleDebug

      - name: Collect debug benchmark APK
        if: success()
        run: |
          set -euo pipefail
          mkdir -p ../dist/stt-bench-debug
          cp app/build/outputs/apk/debug/app-debug.apk ../dist/stt-bench-debug/INSTALL_THIS_tldh-stt-bench-${VERSION_NAME}-debug.apk
          (cd ../dist/stt-bench-debug && sha256sum *.apk > SHA256SUMS.txt)

      - name: Upload debug benchmark artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: INSTALL_THIS_tldh-stt-bench-debug-apk-${{ github.sha }}
          path: dist/stt-bench-debug/*
          if-no-files-found: error

  publish_benchmark_release:
    name: Publish benchmark APK release
    needs: verify_benchmark_app
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: stt-bench
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Check whether benchmark release already exists
        id: release_check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release ${RELEASE_TAG} already exists. Skipping publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare signing key when available
        if: steps.release_check.outputs.exists == 'false'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          if [ -n "${ANDROID_KEYSTORE_BASE64:-}" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/tldh-bench-release.jks"
            echo "ANDROID_KEYSTORE_FILE=$RUNNER_TEMP/tldh-bench-release.jks" >> "$GITHUB_ENV"
          else
            echo "No signing secret set. Release will fall back to debug signing for benchmark-only installability."
          fi

      - name: Build benchmark release APK
        if: steps.release_check.outputs.exists == 'false'
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: bash scripts/gradle.sh -PVERSION_NAME="${VERSION_NAME}" -PVERSION_CODE="${VERSION_CODE}" assembleRelease

      - name: Package benchmark release assets
        if: steps.release_check.outputs.exists == 'false'
        run: |
          set -euo pipefail
          mkdir -p ../dist/stt-bench-release
          cp app/build/outputs/apk/release/app-release.apk "../dist/stt-bench-release/tldh-stt-bench-${VERSION_NAME}.apk"
          (cd ../dist/stt-bench-release && sha256sum *.apk > SHA256SUMS.txt)
          python - <<'PY'
          import json, os, pathlib
          v = os.environ['VERSION_NAME']
          out = pathlib.Path('../dist/stt-bench-release/release-manifest.json')
          out.write_text(json.dumps({
            'app': 'tldh-stt-bench',
            'package': 'dev.bitsbots.tldhbench',
            'version': v,
            'versionCode': int(os.environ['VERSION_CODE']),
            'channel': 'benchmark',
            'tag': os.environ['RELEASE_TAG'],
            'asset': f'tldh-stt-bench-{v}.apk',
            'notes': 'Separate benchmark app. Main tl;dh app code is not modified.'
          }, indent=2), encoding='utf-8')
          PY

      - name: Publish benchmark GitHub release
        if: steps.release_check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "${RELEASE_TAG}" ../dist/stt-bench-release/* \
            --title "tl;dh STT Bench ${VERSION_NAME}" \
            --notes "Install this APK for benchmarking only: tldh-stt-bench-${VERSION_NAME}.apk. This is not the main tl;dh app and uses package dev.bitsbots.tldhbench."
